<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN"
    "http://www.w3.org/TR/html4/frameset.dtd">
<html>
<head>
    <title>This is My HTML Frames Example</title>
</head>

<!-- Define the frameset: 2 rows -->
<frameset rows="20%,80%">
    <!-- Top frame (header) -->
    <frame src="header.html" name="headerFrame" scrolling="no" noresize>

    <!-- Nested frameset: 2 columns -->
    <frameset cols="25%,75%">
        <!-- Left frame (menu) -->
        <frame src="menu.html" name="menuFrame">
        <!-- Right frame (content) -->
        <frame src="content.html" name="contentFrame">
    </frameset>
</frameset>

<!-- Fallback for browsers that don't support frames -->
<noframes>
    <body>
        <p>Your browser does not support frames. Please update your browser.Your browser does not support frames. Please update your browser</p>
    </body>
</noframes>
</html>
